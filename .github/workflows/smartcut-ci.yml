name: SmartCut CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint black mypy types-requests
          pip install -r requirements.txt

      - name: Check code formatting with Black
        run: black --check --line-length 100 .

      - name: Lint with flake8
        run: flake8 . --count --max-line-length=100 --statistics --exclude=venv,__pycache__,migrations

      - name: Lint with pylint
        run: pylint --fail-under=7.0 api core domain integrations optimization repository reports --exit-zero

      - name: Type check with mypy
        run: mypy --ignore-missing-imports --allow-untyped-decorators api/ core/ domain/ interfaces/

  test:
    name: Run Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false        
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          pip install -r requirements.txt
          # Установка тестовых зависимостей
          pip install pytest-mock pytest-xdist

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=api \
            --cov=core \
            --cov=domain \
            --cov=integrations \
            --cov=optimization \
            --cov=repository \
            --cov=reports \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-python${{ matrix.python-version }}
          path: htmlcov/

      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          flags: unittests
          name: smartcut-coverage

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit security scan
        run: bandit -r api/ core/ domain/ integrations/ repository/ reports/ -f json -o bandit-report.json || true

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: bandit-report.json

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: smartcut:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Test Docker image
        run: |
          docker run --rm smartcut:latest python -c "import sys; sys.path.insert(0, '.'); from core.smart_cut_backend import SmartCutBackend; print('Docker image works!')"

  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [lint, test, security, docker-build]
    if: always()
